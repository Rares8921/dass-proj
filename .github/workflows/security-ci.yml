name: security-ci

on:
  push:
    branches: [ main, v1, v2 ]
  pull_request:
    branches: [ main, v1, v2 ]

permissions:
  contents: read
  security-events: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify
        run: mvn -B verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          retention-days: 14
          path: |
            target/surefire-reports/**
            target/failsafe-reports/**

  sca-snyk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and run Snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          npm install -g snyk
          snyk test --severity-threshold=high

  dast:
    runs-on: ubuntu-latest
    needs: build-and-test
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: auth_system
          POSTGRES_USER: auth_user
          POSTGRES_PASSWORD: auth_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Start application
        run: |
          mvn -B -DskipTests spring-boot:run -Dspring-boot.run.profiles=test > app.log 2>&1 &
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:8080 >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          cat app.log
          exit 1

      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://127.0.0.1:8080'
          allow_issue_writing: false
          fail_action: false
          cmd_options: '-J zap-report.json -w zap-report.md -r zap-report.html'

      - name: Upload DAST artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-reports
          retention-days: 14
          path: |
            app.log
            zap-report.json
            zap-report.md
            zap-report.html