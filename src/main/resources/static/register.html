<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuthX | Register</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="page-body">
<div class="page-shell">
    <header class="topbar">
        <a class="brand" href="/index.html">AuthX</a>
        <nav class="nav-links">
            <a href="/login.html">Login</a>
            <a href="/register.html" class="active">Register</a>
            <a href="/forgot-password.html">Reset</a>
            <a href="/tickets.html">Tickets</a>
            <a href="/audit.html">Audit</a>
        </nav>
        <div class="topbar-actions">
            <span id="session-pill" class="session-pill">Guest</span>
            <button id="logout-button" class="button secondary hidden" type="button">Logout</button>
        </div>
    </header>

    <main class="auth-layout">
        <section class="panel auth-copy-panel">
            <p class="eyebrow">Registration</p>
            <h1>Create an account</h1>
            <p class="lead">
                Register to access the ticketing platform.
            </p>
        </section>

        <section class="panel form-panel">
            <div class="panel-header">
                <h2>Register</h2>
            </div>
            <form id="register-form" class="form-grid">
                <label>
                    <span>Email</span>
                    <input id="email" type="email" autocomplete="username" required>
                </label>
                <label>
                    <span>Password</span>
                    <input id="password" type="password" autocomplete="new-password" required>
                </label>
                <button class="button primary" type="submit">Create Account</button>
            </form>
            <div class="inline-links">
                <a href="/login.html">Already have an account?</a>
            </div>
            <section id="flash-banner" class="flash-banner hidden"></section>
        </section>
    </main>
</div>
<script defer src="/js/common.js"></script>
<script defer src="/js/register.js"></script>
</body>
</html>
