<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuthX | Reset Password</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="page-body">
<div class="page-shell">
    <header class="topbar">
        <a class="brand" href="/index.html">AuthX</a>
        <nav class="nav-links">
            <a href="/login.html">Login</a>
            <a href="/register.html">Register</a>
            <a href="/forgot-password.html" class="active">Reset</a>
            <a href="/tickets.html">Tickets</a>
            <a href="/audit.html">Audit</a>
        </nav>
        <div class="topbar-actions">
            <span id="session-pill" class="session-pill">Guest</span>
            <button id="logout-button" class="button secondary hidden" type="button">Logout</button>
        </div>
    </header>

    <main class="auth-layout">
        <section class="panel auth-copy-panel">
            <p class="eyebrow">Recovery</p>
            <h1>Set New Password</h1>
            <p class="lead">
                Enter your reset token and your new password.
            </p>
        </section>

        <section class="panel form-panel">
            <div class="panel-header">
                <h2>Reset Password</h2>
            </div>
            <form id="reset-form" class="form-grid">
                <label>
                    <span>Reset Token</span>
                    <input id="token" type="text" required>
                </label>
                <label>
                    <span>New Password</span>
                    <input id="new-password" type="password" autocomplete="new-password" required>
                </label>
                <button class="button primary" type="submit">Update Password</button>
            </form>
            <section id="flash-banner" class="flash-banner hidden"></section>
        </section>
    </main>
</div>
<script defer src="/js/common.js"></script>
<script defer src="/js/reset.js"></script>
</body>
</html>
