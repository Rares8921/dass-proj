server:
  port: 8080
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

spring:
  application:
    name: auth-system
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
  datasource:
    url: jdbc:postgresql://localhost:5432/auth_system
    username: auth_user
    password: auth_password
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  jackson:
    time-zone: UTC
  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

app:
  session:
    cookie-name: AUTH_SESSION
    duration-minutes: 30
    http-only: true
    secure: ${APP_SESSION_SECURE:true}
    same-site: Strict
  mail:
    from: no-reply@authx.local
  security:
    max-failed-login-attempts: 5
    lock-duration-minutes: 15
    reset-token-duration-minutes: 15
    reset-link-base-url: http://localhost:8080
  bootstrap:
    password-mode: ARGON2
    manager:
      email: manager@authx.local
      password: Manager123!
    analyst:
      email: analyst@authx.local
      password: Analyst123!
